baseURL = 'https://talktime.metacog.co.kr/'
locale = 'en-us'
title = 'TalkTime English Notes'
theme = 'PaperMod'
paginate = 10

[params]
  env = 'production'
  title = 'TalkTime English Notes'
  description = 'Structured study notes auto-generated from English conversation class transcripts: idioms, vocabulary, corrections, quizzes, and mini diary lines'
  author = 'jeonck'
  defaultTheme = 'auto'
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = false
  tocopen = false

  [params.homeInfoParams]
    Title = 'TalkTime English Notes 🎙️'
    Content = 'Paste a class transcript and get a structured study post: idioms with examples, new vocabulary, common-mistake corrections, a self-check quiz, and mini diary sentences built on the idioms.'

  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/jeonck/talktime'

[menu]
  [[menu.main]]
    identifier = 'input'
    name = 'Add Transcript ✏️'
    url = 'https://github.com/jeonck/talktime/edit/main/input/script.md'
    weight = 5
  [[menu.main]]
    identifier = 'posts'
    name = 'Posts'
    url = '/posts/'
    weight = 10
  [[menu.main]]
    identifier = 'tags'
    name = 'Tags'
    url = '/tags/'
    weight = 20
  [[menu.main]]
    identifier = 'search'
    name = 'Search'
    url = '/search/'
    weight = 30

[outputs]
  home = ['HTML', 'RSS', 'JSON']

# Quiz sections use raw HTML <details>/<summary> accordions in generated posts
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
